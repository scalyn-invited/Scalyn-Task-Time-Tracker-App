<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings | Scalyn Task Time Tracker</title>
  <link rel="stylesheet" href="/assets/css/app.css" />
  <script defer src="/assets/js/app.js"></script>
</head>
<body data-page="settings">
  <main class="app-shell dashboard-shell">
    <aside class="sidebar">
      <a class="brand brand-sidebar" href="/" aria-label="Scalyn home">
        <span class="brand-mark brand-mark-large" aria-hidden="true">
          <svg viewBox="0 0 48 48" role="img" aria-hidden="true">
            <defs>
              <linearGradient id="brandGradientSettings" x1="0%" y1="0%" y2="100%" x2="100%">
                <stop offset="0%" stop-color="#48a0ff" />
                <stop offset="100%" stop-color="#2b6bff" />
              </linearGradient>
            </defs>
            <path d="M35 14.5A16 16 0 1 0 35 33" fill="none" stroke="url(#brandGradientSettings)" stroke-width="5.5" stroke-linecap="round" />
            <path d="M31 12l6 2-2 6" fill="none" stroke="url(#brandGradientSettings)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" />
            <circle cx="24" cy="24" r="3.5" fill="#2b6bff" />
          </svg>
        </span>
        <span class="brand-copy"><strong>Scalyn</strong><span>Task Time Tracker</span></span>
      </a>
      <nav class="sidebar-nav" aria-label="Primary">
        <a class="sidebar-link" href="/timer"><span class="icon-wrap" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M10 2h4M12 6v2m0 0a8 8 0 1 1 0 16 8 8 0 0 1 0-16Zm0 4v4l3 2" /></svg></span><span>Timer</span></a>
        <a class="sidebar-link" href="/tasks"><span class="icon-wrap" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M7 3h10v3H7zm0 6h10m-10 4h10m-10 4h6M5 5h0m0 6h0m0 4h0m0 4h0" /></svg></span><span>Task</span></a>
        <a class="sidebar-link" href="/timesheets"><span class="icon-wrap" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 4h14a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1Zm3 4h8m-8 4h8m-8 4h5" /></svg></span><span>Timesheets</span></a>
        <a class="sidebar-link" href="/clients"><span class="icon-wrap" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M14 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4ZM4 21a6 6 0 0 1 12 0m3-10h3m-1.5-1.5V12.5" /></svg></span><span>Clients</span></a>
        <a class="sidebar-link" href="/team"><span class="icon-wrap" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M9 11a3 3 0 1 0-3-3 3 3 0 0 0 3 3Zm7 0a3 3 0 1 0-3-3 3 3 0 0 0 3 3ZM3 20a6 6 0 0 1 12 0m6 0a6 6 0 0 0-4.5-5.8" /></svg></span><span>Team</span></a>
        <a class="sidebar-link" href="/reports"><span class="icon-wrap" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 20V10m7 10V4m7 16v-8" /></svg></span><span>Reports</span></a>
        <a class="sidebar-link active" href="/settings" aria-current="page"><span class="icon-wrap" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M10.6 3.5h2.8l.5 2a7.3 7.3 0 0 1 1.4.8l2-.6 1.4 2.4-1.5 1.4a7.6 7.6 0 0 1 0 1.6l1.5 1.4-1.4 2.4-2-.6a7.3 7.3 0 0 1-1.4.8l-.5 2h-2.8l-.5-2a7.3 7.3 0 0 1-1.4-.8l-2 .6-1.4-2.4 1.5-1.4a7.6 7.6 0 0 1 0-1.6L5.3 8.1l1.4-2.4 2 .6a7.3 7.3 0 0 1 1.4-.8zM12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z" /></svg></span><span>Setting</span></a>
      </nav>
      <div class="sidebar-footer">
        <button class="profile-chip" type="button" aria-label="Open user menu">
          <span class="avatar avatar-small">JD</span>
          <span class="profile-chip-copy"><strong>John Doe</strong><span>john@example.com</span></span>
          <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="m7 10 5 5 5-5" /></svg>
        </button>
      </div>
    </aside>

      <section class="route-main">
        <header class="topbar dashboard-topbar">
          <div>
            <h1>Settings</h1>
            <p class="panel-copy">Manage account preferences and the global task label catalog.</p>
          </div>
        </header>

        <section class="route-grid route-grid-single">
          <article class="card-panel route-card settings-labels-panel" data-settings-labels-panel>
            <div class="section-header">
              <div>
                <h2>Task Labels</h2>
              </div>
            </div>

          <div class="settings-labels-toolbar">
            <div class="settings-labels-copy" aria-hidden="true"></div>
            <div class="settings-label-create-row" data-settings-label-create-row>
              <input type="text" data-settings-label-input maxlength="80" placeholder="New global label" />
              <button type="button" class="btn btn-primary" data-settings-label-create>Add label</button>
            </div>
          </div>

          <div data-settings-label-feedback class="feedback" aria-live="polite"></div>
          <div data-settings-label-list class="settings-label-list"></div>
        </article>
      </section>
    </section>
  </main>
</body>
</html>

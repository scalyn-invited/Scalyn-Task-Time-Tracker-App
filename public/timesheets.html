<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timesheets | Scalyn Task Time Tracker</title>
    <link rel="stylesheet" href="/assets/css/app.css" />
    <link rel="stylesheet" href="/assets/vendor/datatables/css/datatables.min.css" />
    <script defer src="/assets/vendor/jquery/jquery.min.js"></script>
    <script defer src="/assets/vendor/datatables/js/datatables.min.js"></script>
    <script type="module" defer src="/assets/js/app.js"></script>
    <script defer src="/assets/js/timesheets.js"></script>
  </head>
  <body data-page="timesheets">
    <main class="app-shell dashboard-shell">
      <aside class="sidebar">
        <a class="brand brand-sidebar" href="/" aria-label="Scalyn home"><span class="brand-mark brand-mark-large" aria-hidden="true"><svg viewBox="0 0 48 48" role="img" aria-hidden="true"><defs><linearGradient id="brandGradientTimesheets" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#48a0ff" /><stop offset="100%" stop-color="#2b6bff" /></linearGradient></defs><path d="M35 14.5A16 16 0 1 0 35 33" fill="none" stroke="url(#brandGradientTimesheets)" stroke-width="5.5" stroke-linecap="round" /><path d="M31 12l6 2-2 6" fill="none" stroke="url(#brandGradientTimesheets)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" /><circle cx="24" cy="24" r="3.5" fill="#2b6bff" /></svg></span><span class="brand-copy"><strong>Scalyn</strong><span>Task Time Tracker</span></span></a>
        <nav class="sidebar-nav" aria-label="Primary">
          <a class="sidebar-link" href="/timer"><span class="icon-wrap" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M10 2h4M12 6v2m0 0a8 8 0 1 1 0 16 8 8 0 0 1 0-16Zm0 4v4l3 2" /></svg></span><span>Timer</span></a>
          <a class="sidebar-link" href="/tasks"><span class="icon-wrap" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M7 3h10v3H7zm0 6h10m-10 4h10m-10 4h6M5 5h0m0 6h0m0 4h0m0 4h0" /></svg></span><span>Task</span></a>
          <a class="sidebar-link active" href="/timesheets" aria-current="page"><span class="icon-wrap" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 4h14a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1Zm3 4h8m-8 4h8m-8 4h5" /></svg></span><span>Timesheets</span></a>
          <a class="sidebar-link" href="/clients"><span class="icon-wrap" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M14 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4ZM4 21a6 6 0 0 1 12 0m3-10h3m-1.5-1.5V12.5" /></svg></span><span>Clients</span></a>
          <a class="sidebar-link" href="/team"><span class="icon-wrap" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M9 11a3 3 0 1 0-3-3 3 3 0 0 0 3 3Zm7 0a3 3 0 1 0-3-3 3 3 0 0 0 3 3ZM3 20a6 6 0 0 1 12 0m6 0a6 6 0 0 0-4.5-5.8" /></svg></span><span>Team</span></a>
          <a class="sidebar-link" href="/reports"><span class="icon-wrap" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 20V10m7 10V4m7 16v-8" /></svg></span><span>Reports</span></a>
          <a class="sidebar-link" href="/settings"><span class="icon-wrap" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M10.6 3.5h2.8l.5 2a7.3 7.3 0 0 1 1.4.8l2-.6 1.4 2.4-1.5 1.4a7.6 7.6 0 0 1 0 1.6l1.5 1.4-1.4 2.4-2-.6a7.3 7.3 0 0 1-1.4.8l-.5 2h-2.8l-.5-2a7.3 7.3 0 0 1-1.4-.8l-2 .6-1.4-2.4 1.5-1.4a7.6 7.6 0 0 1 0-1.6L5.3 8.1l1.4-2.4 2 .6a7.3 7.3 0 0 1 1.4-.8zM12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z" /></svg></span><span>Setting</span></a>
        </nav>
        <div class="sidebar-footer"><button class="profile-chip" type="button" aria-label="Open user menu"><span class="avatar avatar-small">JD</span><span class="profile-chip-copy"><strong>John Doe</strong><span>john@example.com</span></span><svg class="chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="m7 10 5 5 5-5" /></svg></button></div>
      </aside>
      <section class="route-main timesheet-page">
        <header class="topbar dashboard-topbar">
          <div>
            <h1>Timesheets</h1>
            <p class="timesheet-subtitle" data-timesheet-range-label>Loading range</p>
          </div>
          <div class="topbar-actions">
            <button class="action-button" type="button" data-timesheet-refresh>
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.34-5.66" /><path d="M20 4v6h-6" /></svg>
              <span>Refresh</span>
            </button>
            <button class="team-switcher" type="button" data-timesheet-reset>
              <span>Reset filters</span>
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m7 10 5 5 5-5" /></svg>
            </button>
          </div>
        </header>

        <section class="timesheet-summary-grid">
          <article class="stat-card stat-card-blue">
            <div class="stat-card-head">Total Duration</div>
            <div class="stat-card-body">
              <strong data-timesheet-total-duration>00:00:00</strong>
              <span>Tracked time</span>
            </div>
          </article>
          <article class="stat-card stat-card-green">
            <div class="stat-card-head">Time Entries</div>
            <div class="stat-card-body">
              <strong data-timesheet-entry-count>0</strong>
              <span>Loaded rows</span>
            </div>
          </article>
          <article class="stat-card stat-card-purple">
            <div class="stat-card-head">Scope</div>
            <div class="stat-card-body">
              <strong data-timesheet-current-user>All users</strong>
              <span data-timesheet-current-client>All clients</span>
            </div>
          </article>
        </section>

        <section class="card-panel timesheet-filter-panel">
          <div class="timesheet-view-toggle" role="tablist" aria-label="Timesheet view">
            <button type="button" class="timesheet-view-button" data-timesheet-view="daily">Daily</button>
            <button type="button" class="timesheet-view-button" data-timesheet-view="weekly">Weekly</button>
            <button type="button" class="timesheet-view-button" data-timesheet-view="monthly">Monthly</button>
          </div>

          <div class="timesheet-filter-grid">
            <label class="field">
              <span>User</span>
              <select data-timesheet-user-filter></select>
            </label>
            <label class="field">
              <span>Client</span>
              <select data-timesheet-client-filter></select>
            </label>
            <label class="field">
              <span>Task</span>
              <select data-timesheet-task-filter></select>
            </label>
            <label class="field">
              <span>From</span>
              <input type="date" data-timesheet-from />
            </label>
            <label class="field">
              <span>To</span>
              <input type="date" data-timesheet-to />
            </label>
          </div>
        </section>

        <section class="card-panel timesheet-groups-panel">
          <div class="panel-head">
            <div>
              <h2>Grouped by date</h2>
            </div>
            <div class="feedback" data-timesheet-feedback aria-live="polite"></div>
          </div>
          <div class="timesheet-groups" data-timesheet-groups></div>
        </section>

        <section class="card-panel timesheet-table-panel">
          <div class="panel-head">
            <div>
              <h2>Time entries</h2>
            </div>
            <div class="timesheet-current-range" data-timesheet-current-task></div>
          </div>
          <div class="datatable-shell">
            <table id="timesheet-table" class="display compact timesheet-table" style="width: 100%;">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Task</th>
                  <th>Client</th>
                  <th>Duration</th>
                  <th>Description</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody data-timesheet-table-body></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
